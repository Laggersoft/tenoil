<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TenOil — Система заявок</title>
    <!-- Favicon -->
  <link rel="icon" type="image/png" href="crs/logo.png">
  <!-- или -->
  <link rel="shortcut icon" href="crs/icon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/locale/ru.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .sidebar-link.active { background-color: rgba(255,255,255,0.15); border-left: 3px solid #fff; }
    .status-pending   { background: #FEF3C7; color: #92400E; }
    .status-completed { background: #D1FAE5; color: #065F46; }
    .status-rejected  { background: #FEE2E2; color: #991B1B; }
    .notification-dot { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    .modal-overlay { backdrop-filter: blur(4px); }
    .file-drop-zone { border: 2px dashed #cbd5e1; transition: all 0.2s; }
    .file-drop-zone.dragging { border-color: #3b82f6; background: #eff6ff; }
    .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #6b7280; }
    .action-label-created { background: #dbeafe; color: #1e40af; }
    .action-label-status_changed { background: #fef3c7; color: #92400e; }
    .action-label-file_added { background: #d1fae5; color: #065f46; }
    .action-label-file_removed { background: #fee2e2; color: #991b1b; }
    .action-label-priority_changed { background: #ede9fe; color: #5b21b6; }
    /* Priority badges */
    .priority-low    { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
    .priority-medium { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
    .priority-high   { background:#fff7ed; color:#9a3412; border:1px solid #fdba74; }
    .priority-urgent { background:#fef2f2; color:#7f1d1d; border:1px solid #fca5a5; }
    /* Avatar */
    .avatar-circle { width:2.5rem; height:2.5rem; border-radius:50%; object-fit:cover; }
    @media print { .no-print { display:none !important; } }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

<!-- ===================== AUTH SCREEN ===================== -->
<div id="auth-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800 p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-32 h-32 bg-white/20 rounded-2xl mb-4">
        <img src="crs/icon.ico" alt="Логотип" class="w-20 h-20 object-contain">
      </div>
      <h1 class="text-3xl font-bold text-white">TenOil</h1>
      <p class="text-blue-200 mt-1">Система управления заявками</p>
    </div>
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="p-8">
        <h2 class="text-xl font-bold text-gray-800 mb-6 text-center"><i class="fas fa-sign-in-alt mr-2 text-blue-500"></i>Вход в систему</h2>
        <div id="login-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>
        <form onsubmit="doLogin(); return false;" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
            <div class="relative">
              <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
              <input id="login-username" type="text" placeholder="Введите логин" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
            <div class="relative">
              <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
              <input id="login-password" type="password" placeholder="Введите пароль" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
            </div>
          </div>
          <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition flex items-center justify-center gap-2">
            <i class="fas fa-sign-in-alt"></i> Войти
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- ===================== APP SCREEN ===================== -->
<div id="app-screen" class="hidden min-h-screen flex">
  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-gradient-to-b from-blue-700 to-blue-900 text-white flex flex-col fixed h-full z-30">
    <div class="p-5 border-b border-blue-600">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
        <img src="crs/icon.ico" alt="Логотип" class="w-20 h-20 object-contain">
        </div>
        <div>
          <div class="font-bold text-lg leading-tight">TenOil</div>
          <div class="text-blue-300 text-xs">Система заявок</div>
        </div>
      </div>
    </div>
    <div class="p-4 border-b border-blue-600">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold" id="sidebar-avatar"></div>
        <div class="overflow-hidden">
          <div class="font-medium text-sm truncate" id="sidebar-name"></div>
          <div class="text-blue-300 text-xs" id="sidebar-role-badge"></div>
        </div>
      </div>
    </div>
    <nav class="flex-1 p-4 space-y-1 overflow-y-auto" id="sidebar-nav"></nav>
    <div class="p-4 border-t border-blue-600">
      <button onclick="doLogout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition text-sm">
        <i class="fas fa-sign-out-alt w-5"></i> Выйти
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-64 flex-1 flex flex-col min-h-screen">
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-20">
      <div>
        <h2 class="text-lg font-bold text-gray-800" id="page-title">Панель управления</h2>
        <p class="text-xs text-gray-500" id="page-subtitle"></p>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="toggleNotifications()" class="relative p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
          <i class="fas fa-bell text-lg"></i>
          <span id="notif-badge" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center notification-dot"></span>
        </button>
        <div class="text-right">
          <div class="text-sm font-medium text-gray-800" id="header-name"></div>
          <div class="text-xs text-gray-500" id="header-role"></div>
        </div>
      </div>
    </header>
    <div class="flex-1 p-6" id="main-content"></div>
  </main>
</div>

<!-- Notifications Panel -->
<div id="notif-panel" class="hidden fixed top-16 right-4 w-96 bg-white rounded-xl shadow-2xl border border-gray-200 z-50 max-h-[80vh] overflow-hidden flex flex-col">
  <div class="flex items-center justify-between p-4 border-b">
    <h3 class="font-semibold text-gray-800"><i class="fas fa-bell mr-2 text-blue-500"></i>Уведомления</h3>
    <div class="flex gap-2">
      <button onclick="markAllRead()" class="text-xs text-blue-600 hover:text-blue-800">Прочитать все</button>
      <button onclick="toggleNotifications()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
    </div>
  </div>
  <div id="notif-list" class="overflow-y-auto flex-1 divide-y divide-gray-100"></div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="hidden fixed inset-0 bg-black/50 modal-overlay z-50 flex items-center justify-center p-4">
  <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto"></div>
</div>

<!-- Toast -->
<div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

<script>
// ===== STATE =====
let currentUser = null
let token = localStorage.getItem('token')
let notifInterval = null
let currentPage = null
let projectsList = []

dayjs.locale('ru')

// ===== API =====
const api = axios.create({ baseURL: '/api' })
api.interceptors.request.use(cfg => {
  if (token) cfg.headers['Authorization'] = `Bearer ${token}`
  return cfg
})

// ===== UTILS =====
function showToast(msg, type = 'success') {
  const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600', warning: 'bg-yellow-600' }
  const icons  = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' }
  const el = document.createElement('div')
  el.className = `fade-in flex items-center gap-3 px-4 py-3 rounded-xl text-white text-sm font-medium shadow-lg ${colors[type]}`
  el.innerHTML = `<i class="fas ${icons[type]}"></i><span>${msg}</span>`
  document.getElementById('toast-container').appendChild(el)
  setTimeout(() => el.remove(), 3500)
}

function statusBadge(status) {
  const map = {
    pending:   '<span class="status-pending   px-2.5 py-1 rounded-full text-xs font-semibold"><i class="fas fa-clock mr-1"></i>На рассмотрении</span>',
    completed: '<span class="status-completed px-2.5 py-1 rounded-full text-xs font-semibold"><i class="fas fa-check mr-1"></i>Исполнено</span>',
    rejected:  '<span class="status-rejected  px-2.5 py-1 rounded-full text-xs font-semibold"><i class="fas fa-times mr-1"></i>Отклонено</span>',
  }
  return map[status] || status
}

function roleBadge(role) {
  const map = {
    admin:     '<span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full text-xs font-semibold">Администратор</span>',
    applicant: '<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-xs font-semibold">Заявитель</span>',
    supplier:  '<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded-full text-xs font-semibold">Снабженец</span>',
  }
  return map[role] || role
}

function roleLabel(role) {
  const map = { admin: 'Администратор', applicant: 'Заявитель', supplier: 'Снабженец' }
  return map[role] || role
}

function formatDate(d) { return dayjs(d).format('DD.MM.YYYY HH:mm') }

function formatBytes(bytes) {
  if (!bytes) return '0 Б'
  if (bytes < 1024) return bytes + ' Б'
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' КБ'
  return (bytes/1024/1024).toFixed(1) + ' МБ'
}

function fileIcon(mime) {
  if (mime.includes('pdf')) return 'fa-file-pdf text-red-500'
  if (mime.includes('word') || mime.includes('document')) return 'fa-file-word text-blue-500'
  if (mime.includes('excel') || mime.includes('spreadsheet') || mime.includes('sheet')) return 'fa-file-excel text-green-500'
  if (mime.includes('image')) return 'fa-file-image text-purple-500'
  return 'fa-file text-gray-500'
}

function escHtml(s) {
  if (!s) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function actionLabel(action) {
  const map = {
    created: { label: 'Создана', cls: 'action-label-created' },
    status_changed: { label: 'Статус изменён', cls: 'action-label-status_changed' },
    file_added: { label: 'Файл добавлен', cls: 'action-label-file_added' },
    file_removed: { label: 'Файл удалён', cls: 'action-label-file_removed' },
    priority_changed: { label: 'Приоритет изменён', cls: 'action-label-priority_changed' },
  }
  const a = map[action] || { label: action, cls: 'bg-gray-100 text-gray-600' }
  return `<span class="${a.cls} px-2 py-0.5 rounded text-xs font-semibold">${a.label}</span>`
}

function statusLabel(s) {
  const map = { pending: 'На рассмотрении', completed: 'Исполнено', rejected: 'Отклонено' }
  return map[s] || s
}

function priorityBadge(p) {
  const map = {
    low:    '<span class="priority-low    px-2 py-0.5 rounded-full text-xs font-semibold"><i class="fas fa-arrow-down mr-1"></i>Низкий</span>',
    medium: '<span class="priority-medium px-2 py-0.5 rounded-full text-xs font-semibold"><i class="fas fa-minus mr-1"></i>Средний</span>',
    high:   '<span class="priority-high   px-2 py-0.5 rounded-full text-xs font-semibold"><i class="fas fa-arrow-up mr-1"></i>Высокий</span>',
    urgent: '<span class="priority-urgent px-2 py-0.5 rounded-full text-xs font-semibold"><i class="fas fa-exclamation mr-1"></i>Срочный</span>',
  }
  return map[p] || map['medium']
}

function priorityLabel(p) {
  const map = { low: 'Низкий', medium: 'Средний', high: 'Высокий', urgent: 'Срочный' }
  return map[p] || 'Средний'
}

function prioritySortValue(p) {
  return { urgent: 4, high: 3, medium: 2, low: 1 }[p] || 2
}

// ===== AUTH =====
async function doLogin() {
  const username = document.getElementById('login-username').value.trim()
  const password = document.getElementById('login-password').value
  const errEl = document.getElementById('login-error')
  errEl.classList.add('hidden')
  if (!username || !password) { errEl.textContent = 'Введите логин и пароль'; errEl.classList.remove('hidden'); return }
  try {
    const res = await api.post('/auth/login', { username, password })
    token = res.data.token
    localStorage.setItem('token', token)
    currentUser = res.data.user
    await loadProjects()
    initApp()
  } catch(e) {
    errEl.textContent = e.response?.data?.error || 'Ошибка входа'
    errEl.classList.remove('hidden')
  }
}

async function doLogout() {
  try { await api.post('/auth/logout') } catch(e) {}
  token = null; localStorage.removeItem('token')
  currentUser = null; projectsList = []
  clearInterval(notifInterval)
  document.getElementById('app-screen').classList.add('hidden')
  document.getElementById('auth-screen').classList.remove('hidden')
}

async function loadProjects() {
  try {
    const res = await api.get('/projects')
    projectsList = res.data.projects || []
  } catch(e) { projectsList = [] }
}

// ===== INIT APP =====
async function initApp() {
  document.getElementById('auth-screen').classList.add('hidden')
  document.getElementById('app-screen').classList.remove('hidden')

  const roleNames = { admin: '🔑 Администратор', applicant: '👤 Заявитель', supplier: '🏪 Снабженец' }
  const roleNamesShort = { admin: 'Администратор', applicant: 'Заявитель', supplier: 'Снабженец' }

  updateSidebarAvatar()
  document.getElementById('sidebar-name').textContent = currentUser.full_name
  document.getElementById('sidebar-role-badge').textContent = roleNames[currentUser.role] || currentUser.role
  document.getElementById('header-name').textContent = currentUser.full_name
  document.getElementById('header-role').textContent = roleNamesShort[currentUser.role] || currentUser.role

  buildSidebar()
  startNotifPolling()

  if (currentUser.role === 'admin') navigateTo('admin-dashboard')
  else if (currentUser.role === 'supplier') navigateTo('dashboard')
  else navigateTo('my-requests')
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav')
  let links = []

  if (currentUser.role === 'admin') {
    links = [
      { id: 'admin-dashboard', icon: 'fa-tachometer-alt',   label: 'Дашборд' },
      { id: 'all-requests',    icon: 'fa-list-alt',          label: 'Все заявки' },
      { id: 'activity',        icon: 'fa-stream',            label: 'Центр активности' },
      { id: 'admin-users',     icon: 'fa-users',             label: 'Пользователи' },
      { id: 'notifications',   icon: 'fa-bell',              label: 'Уведомления' },
      { id: 'profile',         icon: 'fa-user-circle',       label: 'Мой профиль' },
    ]
  } else if (currentUser.role === 'supplier') {
    links = [
      { id: 'dashboard',       icon: 'fa-chart-bar',         label: 'Дашборд' },
      { id: 'all-requests',    icon: 'fa-list-alt',          label: 'Все заявки' },
      { id: 'activity',        icon: 'fa-stream',            label: 'Центр активности' },
      { id: 'notifications',   icon: 'fa-bell',              label: 'Уведомления' },
      { id: 'profile',         icon: 'fa-user-circle',       label: 'Мой профиль' },
    ]
  } else {
    links = [
      { id: 'my-requests',     icon: 'fa-clipboard-list',    label: 'Мои заявки' },
      { id: 'new-request',     icon: 'fa-plus-circle',       label: 'Новая заявка' },
      { id: 'notifications',   icon: 'fa-bell',              label: 'Уведомления' },
      { id: 'profile',         icon: 'fa-user-circle',       label: 'Мой профиль' },
    ]
  }

  nav.innerHTML = links.map(l => `
    <button id="nav-${l.id}" onclick="navigateTo('${l.id}')"
      class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition text-sm font-medium text-left">
      <i class="fas ${l.icon} w-5 text-center opacity-80"></i>
      <span>${l.label}</span>
    </button>
  `).join('')
}

function navigateTo(page) {
  currentPage = page
  document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'))
  const navBtn = document.getElementById(`nav-${page}`)
  if (navBtn) navBtn.classList.add('active')

  const titles = {
    'admin-dashboard': ['Дашборд', 'Статистика системы'],
    'dashboard':       ['Дашборд', 'Статистика и обзор'],
    'all-requests':    ['Все заявки', 'Управление заявками'],
    'my-requests':     ['Мои заявки', 'История ваших заявок'],
    'new-request':     ['Новая заявка', 'Создать заявку на товар'],
    'notifications':   ['Уведомления', 'Системные уведомления'],
    'admin-users':     ['Пользователи', 'Управление пользователями'],
    'profile':         ['Мой профиль', 'Редактирование профиля'],
    'activity':        ['Центр активности', 'Все действия в системе'],
  }
  const [title, subtitle] = titles[page] || [page, '']
  document.getElementById('page-title').textContent = title
  document.getElementById('page-subtitle').textContent = subtitle

  const pages = {
    'admin-dashboard': renderAdminDashboard,
    'dashboard':       renderDashboard,
    'all-requests':    renderAllRequests,
    'my-requests':     renderMyRequests,
    'new-request':     renderNewRequest,
    'notifications':   renderNotificationsPage,
    'admin-users':     renderAdminUsers,
    'profile':         renderProfile,
    'activity':        renderActivity,
  }
  if (pages[page]) pages[page]()
}

// ===== NOTIFICATIONS =====
async function loadNotifCount() {
  try {
    const res = await api.get('/notifications/unread-count')
    const badge = document.getElementById('notif-badge')
    if (res.data.count > 0) {
      badge.textContent = res.data.count > 9 ? '9+' : res.data.count
      badge.classList.remove('hidden')
    } else { badge.classList.add('hidden') }
  } catch(e) {}
}

function startNotifPolling() {
  loadNotifCount()
  notifInterval = setInterval(loadNotifCount, 15000)
}

async function toggleNotifications() {
  const panel = document.getElementById('notif-panel')
  panel.classList.toggle('hidden')
  if (!panel.classList.contains('hidden')) await loadNotificationsPanel()
}

async function loadNotificationsPanel() {
  const list = document.getElementById('notif-list')
  list.innerHTML = '<div class="p-4 text-center text-gray-400"><i class="fas fa-spinner fa-spin"></i></div>'
  try {
    const res = await api.get('/notifications')
    const notifs = res.data.notifications
    if (!notifs.length) {
      list.innerHTML = '<div class="p-6 text-center text-gray-400"><i class="fas fa-bell-slash text-2xl mb-2 block"></i>Нет уведомлений</div>'
      return
    }
    list.innerHTML = notifs.map(n => `
      <div class="p-3 hover:bg-gray-50 cursor-pointer ${n.is_read ? '' : 'bg-blue-50/50'}" onclick="readNotif(${n.id}, this)">
        <div class="flex gap-2">
          <div class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${n.is_read ? 'bg-gray-200' : 'bg-blue-500'}"></div>
          <div>
            <div class="text-sm font-medium text-gray-800">${escHtml(n.title)}</div>
            <div class="text-xs text-gray-600 mt-0.5">${escHtml(n.message)}</div>
            <div class="text-xs text-gray-400 mt-1">${formatDate(n.created_at)}</div>
          </div>
        </div>
      </div>
    `).join('')
  } catch(e) {
    list.innerHTML = '<div class="p-4 text-center text-red-400">Ошибка загрузки</div>'
  }
}

async function readNotif(id, el) {
  try {
    await api.patch(`/notifications/${id}/read`)
    el.querySelector('.w-2').className = 'w-2 h-2 rounded-full mt-1.5 flex-shrink-0 bg-gray-200'
    el.classList.remove('bg-blue-50/50')
    loadNotifCount()
  } catch(e) {}
}

async function markAllRead() {
  try {
    await api.patch('/notifications/read-all')
    document.getElementById('notif-badge').classList.add('hidden')
    await loadNotificationsPanel()
    showToast('Все уведомления прочитаны')
  } catch(e) {}
}

// ===== HELPERS =====
function statCard(label, value, icon, color) {
  const colors = { blue: 'bg-blue-50 text-blue-600', yellow: 'bg-yellow-50 text-yellow-600', green: 'bg-green-50 text-green-600', red: 'bg-red-50 text-red-600', purple: 'bg-purple-50 text-purple-600' }
  return `
    <div class="bg-white rounded-xl border border-gray-200 p-5 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-3">
        <span class="text-gray-500 text-sm">${label}</span>
        <div class="w-10 h-10 rounded-lg ${colors[color]} flex items-center justify-center">
          <i class="fas ${icon} text-lg"></i>
        </div>
      </div>
      <div class="text-3xl font-bold text-gray-800">${value}</div>
    </div>
  `
}

function progressBar(label, val, total, color) {
  const pct = total > 0 ? Math.round((val / total) * 100) : 0
  return `
    <div>
      <div class="flex justify-between text-sm mb-1">
        <span class="text-gray-600">${label}</span>
        <span class="font-medium text-gray-800">${val} (${pct}%)</span>
      </div>
      <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
        <div class="${color} h-full rounded-full transition-all" style="width:${pct}%"></div>
      </div>
    </div>
  `
}

function errorBlock(msg) {
  return `<div class="bg-white rounded-xl border border-gray-200 p-12 text-center text-red-400">
    <i class="fas fa-exclamation-circle text-3xl mb-2 block"></i>${msg}
  </div>`
}

let searchDebounce = null
function debounceLoadRequests() {
  clearTimeout(searchDebounce)
  searchDebounce = setTimeout(loadRequests, 400)
}

async function loadRequests() {
  const wrap = document.getElementById('requests-table-wrap')
  if (!wrap) return
  wrap.innerHTML = '<div class="bg-white rounded-xl border border-gray-200 p-8 text-center"><i class="fas fa-spinner fa-spin text-blue-500 text-2xl"></i></div>'
  try {
    const params = {}
    if (reqFilters.status !== 'all') params.status = reqFilters.status
    if (reqFilters.search) params.search = reqFilters.search
    if (reqFilters.project_id !== 'all') params.project_id = reqFilters.project_id
    if (reqFilters.applicant_id) params.applicant_id = reqFilters.applicant_id
    if (reqFilters.date_from) params.date_from = reqFilters.date_from
    if (reqFilters.date_to) params.date_to = reqFilters.date_to
    if (reqFilters.priority !== 'all') params.priority = reqFilters.priority
    params.sort = reqFilters.sort
    params.sort_by = reqFilters.sort_by || 'date'

    const res = await api.get('/requests', { params })
    const reqs = res.data.requests || []

    if (!reqs.length) {
      wrap.innerHTML = `<div class="bg-white rounded-xl border border-gray-200 p-12 text-center">
        <i class="fas fa-inbox text-gray-300 text-4xl mb-3 block"></i>
        <p class="text-gray-500">Заявок не найдено</p>
      </div>`
      return
    }

    wrap.innerHTML = `
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b">
              <tr class="text-left text-xs uppercase text-gray-500">
                <th class="px-4 py-3">Номер</th>
                <th class="px-4 py-3">Товар / Модель</th>
                <th class="px-4 py-3">Проект</th>
                <th class="px-4 py-3">Кол-во</th>
                <th class="px-4 py-3">Заявитель</th>
                <th class="px-4 py-3">Дата</th>
                <th class="px-4 py-3">Приоритет</th>
                <th class="px-4 py-3">Статус</th>
                <th class="px-4 py-3">Действия</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              ${reqs.map(r => `
                <tr class="hover:bg-gray-50 transition">
                  <td class="px-4 py-3 text-gray-600 font-mono text-xs whitespace-nowrap">${escHtml(r.request_number || ('#' + r.id))}</td>

                    <div class="text-gray-400 text-xs">${escHtml(r.model)}</div>
                  </td>
                  <td class="px-4 py-3 text-gray-600 text-xs">${r.project_name ? escHtml(r.project_name) : '<span class="text-gray-300">—</span>'}</td>
                  <td class="px-4 py-3 font-medium">${r.quantity} шт.</td>

                      <div class="w-7 h-7 rounded-full bg-blue-100 text-blue-600 text-xs flex items-center justify-center font-bold">${escHtml(r.applicant_name)[0]}</div>

function addRequestItem() {
  requestItems.push({ product_name: '', model: '', quantity: 1, unit: 'шт.' })
  renderItemsTable()
  // Focus on last product_name input
  const inputs = document.querySelectorAll('#items-tbody input[type=text]')
  if (inputs.length >= 2) inputs[inputs.length - 2].focus()
}

function removeRequestItem(idx) {
  if (requestItems.length <= 1) return
  requestItems.splice(idx, 1)
  renderItemsTable()
}

let pendingFiles = []

function handleFileSelect(files) {
  for (const f of files) addPendingFile(f)
}

function handleFileDrop(e) {
  e.preventDefault()
  document.getElementById('file-drop-zone').classList.remove('dragging')
  for (const f of e.dataTransfer.files) addPendingFile(f)
}

function addPendingFile(file) {
  const allowed = ['application/pdf','application/msword',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    'application/vnd.ms-excel',
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    'image/jpeg','image/png']
  if (!allowed.includes(file.type)) { showToast(`Недопустимый тип: ${file.name}`, 'error'); return }
  if (file.size > 20*1024*1024) { showToast(`Файл слишком большой: ${file.name}`, 'error'); return }
  pendingFiles.push(file)
  renderPendingFiles()
}

function renderPendingFiles() {
  const list = document.getElementById('nr-file-list')
  if (!list) return
  if (!pendingFiles.length) { list.innerHTML = ''; return }
  list.innerHTML = pendingFiles.map((f, i) => `
    <div class="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2">
      <div class="flex items-center gap-2 text-sm">
        <i class="fas ${fileIcon(f.type)}"></i>
        <span class="text-gray-700 truncate max-w-xs">${escHtml(f.name)}</span>
        <span class="text-gray-400 text-xs">${formatBytes(f.size)}</span>
      </div>
      <button onclick="pendingFiles.splice(${i},1); renderPendingFiles()" class="text-red-400 hover:text-red-600 text-xs"><i class="fas fa-times"></i></button>
    </div>
  `).join('')
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.onload = e => resolve(e.target.result.split(',')[1])
    reader.onerror = reject
    reader.readAsDataURL(file)
  })
}

async function submitNewRequest() {
  const project_id = document.getElementById('nr-project').value || null
  const comment = document.getElementById('nr-comment').value.trim()
  const priority = document.getElementById('nr-priority').value
  const errEl = document.getElementById('new-req-error')
  errEl.classList.add('hidden')

  // Validate items
  const validItems = requestItems.filter(i => i.product_name.trim() && i.model.trim())
  if (!validItems.length) {
    errEl.textContent = 'Заполните хотя бы одну позицию (наименование и модель)'
    errEl.classList.remove('hidden')
    return
  }
  for (const item of validItems) {
    if (!item.quantity || item.quantity < 1) {
      errEl.textContent = 'Количество в каждой позиции должно быть больше 0'
      errEl.classList.remove('hidden')
      return
    }
  }

  try {
    const res = await api.post('/requests', {
      items: validItems.map(i => ({ ...i, quantity: parseInt(String(i.quantity)) })),
      comment: comment || undefined,
      project_id: project_id ? parseInt(project_id) : null,
      priority
    })
    const requestId = res.data.id

    // Upload files if any
    for (const file of pendingFiles) {
      try {
        const file_data = await fileToBase64(file)
        await api.post(`/requests/${requestId}/files`, { file_name: file.name, mime_type: file.type, file_data })
      } catch(e) { showToast(`Ошибка загрузки файла: ${file.name}`, 'warning') }
    }

    pendingFiles = []
    requestItems = [{ product_name: '', model: '', quantity: 1, unit: 'шт.' }]
    showToast(`Заявка ${res.data.request_number} отправлена!`, 'success')
    navigateTo('my-requests')
  } catch(e) {
    errEl.textContent = e.response?.data?.error || 'Ошибка отправки'
    errEl.classList.remove('hidden')
  }
}

async function downloadFile(requestId, fileId, fileName) {
  try {
    const res = await api.get(`/requests/${requestId}/files/${fileId}`)
    const { file_data, mime_type } = res.data
    const blob = base64ToBlob(file_data, mime_type)
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url; a.download = fileName; a.click()
    URL.revokeObjectURL(url)
  } catch(e) { showToast('Ошибка скачивания файла', 'error') }
}

function base64ToBlob(b64, type) {
  const bytes = atob(b64)
  const buf = new Uint8Array(bytes.length)
  for (let i = 0; i < bytes.length; i++) buf[i] = bytes.charCodeAt(i)
  return new Blob([buf], { type })
}

async function deleteModalFile(requestId, fileId) {
  if (!confirm('Удалить файл?')) return
  try {
    await api.delete(`/requests/${requestId}/files/${fileId}`)
    document.getElementById(`file-row-${fileId}`)?.remove()
    showToast('Файл удалён')
  } catch(e) { showToast(e.response?.data?.error || 'Ошибка удаления', 'error') }
}

function handleModalFileDrop(e, requestId) {
  e.preventDefault()
  e.currentTarget.classList.remove('dragging')
  uploadModalFiles(e.dataTransfer.files, requestId)
}

async function uploadModalFiles(files, requestId) {
  const allowed = ['application/pdf','application/msword',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    'application/vnd.ms-excel',
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    'image/jpeg','image/png']

  for (const file of files) {
    if (!allowed.includes(file.type)) { showToast(`Недопустимый тип: ${file.name}`, 'error'); continue }
    if (file.size > 20*1024*1024) { showToast(`Слишком большой: ${file.name}`, 'error'); continue }
    try {
      const file_data = await fileToBase64(file)
      await api.post(`/requests/${requestId}/files`, { file_name: file.name, mime_type: file.type, file_data })
      showToast(`Файл загружен: ${file.name}`)
    } catch(e) { showToast(`Ошибка загрузки: ${file.name}`, 'error') }
  }
  // Reload modal
  await openRequestModal(requestId)
  switchModalTab('files')
}

function setStatusBtn(status) {
  window._selectedStatus = status
  ;['pending','completed','rejected'].forEach(s => {
    const btn = document.getElementById(`btn-${s}`)
    if (!btn) return
    const selected = { pending: 'border-yellow-400 bg-yellow-50 text-yellow-700', completed: 'border-green-400 bg-green-50 text-green-700', rejected: 'border-red-400 bg-red-50 text-red-700' }
    const normal = 'border-gray-200 text-gray-500 hover:border-gray-300'
    if (s === status) {
      btn.className = `px-3 py-2 rounded-lg text-xs font-semibold border-2 transition ${selected[s]}`
    } else {
      btn.className = `px-3 py-2 rounded-lg text-xs font-semibold border-2 transition ${normal}`
    }
  })
  document.getElementById('rejection-reason-wrap')?.classList.toggle('hidden', status !== 'rejected')
}

async function saveStatus(id) {
  const status = window._selectedStatus
  const errEl = document.getElementById('status-change-error')
  errEl?.classList.add('hidden')
  let rejection_reason = ''
  if (status === 'rejected') {
    rejection_reason = document.getElementById('rejection-reason')?.value?.trim()
    if (!rejection_reason) {
      errEl.textContent = 'Укажите причину отказа'
      errEl?.classList.remove('hidden')
      return
    }
  }
  try {
    await api.patch(`/requests/${id}/status`, { status, rejection_reason })
    showToast('Статус обновлён!', 'success')
    closeModal()
    if (currentPage === 'all-requests') await loadRequests()
    if (currentPage === 'dashboard' || currentPage === 'admin-dashboard') navigateTo(currentPage)
    loadNotifCount()
  } catch(e) {
    if (errEl) { errEl.textContent = e.response?.data?.error || 'Ошибка'; errEl.classList.remove('hidden') }
  }
}

let _pendingAvatarBase64 = null

async function handleAvatarChange(input) {
  const file = input.files[0]
  if (!file) return
  const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp']
  if (!allowed.includes(file.type)) { showToast('Допустимые форматы: JPG, PNG, GIF, WebP', 'error'); return }
  if (file.size > 500 * 1024) { showToast('Размер аватара не должен превышать 500KB', 'error'); return }

  const reader = new FileReader()
  reader.onload = (e) => {
    _pendingAvatarBase64 = e.target.result // data:image/...;base64,...
    const wrap = document.getElementById('profile-avatar-wrap')
    if (wrap) wrap.innerHTML = `<img src="${e.target.result}" alt="Аватар" class="w-full h-full object-cover" />`
  }
  reader.readAsDataURL(file)
}

async function saveProfile() {
  const full_name = document.getElementById('pf-fullname').value.trim()
  const email = document.getElementById('pf-email').value.trim()
  const phone = document.getElementById('pf-phone').value.trim()
  const position = document.getElementById('pf-position').value.trim()
  const errEl = document.getElementById('profile-form-error')
  const okEl = document.getElementById('profile-form-success')
  errEl.classList.add('hidden'); okEl.classList.add('hidden')

  if (!full_name) { errEl.textContent = 'ФИО не может быть пустым'; errEl.classList.remove('hidden'); return }
  if (!email) { errEl.textContent = 'Email не может быть пустым'; errEl.classList.remove('hidden'); return }

  const body = { full_name, email, phone: phone || null, position: position || null }
  if (_pendingAvatarBase64) body.avatar = _pendingAvatarBase64

  try {
    const res = await api.put('/auth/profile', body)
    // Update current user state
    currentUser = { ...currentUser, ...res.data.user }
    _pendingAvatarBase64 = null
    document.getElementById('sidebar-name').textContent = currentUser.full_name
    document.getElementById('header-name').textContent = currentUser.full_name
    updateSidebarAvatar()
    okEl.textContent = 'Профиль успешно сохранён!'
    okEl.classList.remove('hidden')
    showToast('Профиль обновлён!', 'success')
  } catch(e) {
    errEl.textContent = e.response?.data?.error || 'Ошибка сохранения'
    errEl.classList.remove('hidden')
  }
}

async function savePassword() {
  const current_password = document.getElementById('pf-cur-pass').value
  const new_password = document.getElementById('pf-new-pass').value
  const new_password2 = document.getElementById('pf-new-pass2').value
  const errEl = document.getElementById('pass-form-error')
  const okEl = document.getElementById('pass-form-success')
  errEl.classList.add('hidden'); okEl.classList.add('hidden')

  if (!current_password) { errEl.textContent = 'Введите текущий пароль'; errEl.classList.remove('hidden'); return }
  if (!new_password) { errEl.textContent = 'Введите новый пароль'; errEl.classList.remove('hidden'); return }
  if (new_password.length < 6) { errEl.textContent = 'Новый пароль должен быть не менее 6 символов'; errEl.classList.remove('hidden'); return }
  if (new_password !== new_password2) { errEl.textContent = 'Пароли не совпадают'; errEl.classList.remove('hidden'); return }

  try {
    await api.put('/auth/profile', { current_password, new_password })
    document.getElementById('pf-cur-pass').value = ''
    document.getElementById('pf-new-pass').value = ''
    document.getElementById('pf-new-pass2').value = ''
    okEl.textContent = 'Пароль успешно изменён!'
    okEl.classList.remove('hidden')
    showToast('Пароль изменён!', 'success')
  } catch(e) {
    errEl.textContent = e.response?.data?.error || 'Ошибка изменения пароля'
    errEl.classList.remove('hidden')
  }
}

          <i class="fas fa-save mr-2"></i>Сохранить изменения
        </button>
      </div>
    </div>
  `
}

async function editUser(id) {
  const full_name = document.getElementById('eu-fullname').value.trim()
  const email = document.getElementById('eu-email').value.trim()
  const role = document.getElementById('eu-role').value
  const password = document.getElementById('eu-password').value
  const errEl = document.getElementById('edit-user-error')
  errEl.classList.add('hidden')

  const body = {}
  if (full_name) body.full_name = full_name
  if (email) body.email = email
  if (role) body.role = role
  if (password) body.password = password

  try {
    await api.put(`/users/${id}`, body)
    showToast('Пользователь обновлён!', 'success')
    closeModal()
    renderAdminUsers()
  } catch(e) {
    errEl.textContent = e.response?.data?.error || 'Ошибка обновления'
    errEl.classList.remove('hidden')
  }
}

async function toggleBlockUser(id, isBlocked) {
  const action = isBlocked ? 'разблокировать' : 'заблокировать'
  if (!confirm(`Вы уверены, что хотите ${action} пользователя?`)) return
  try {
    const res = await api.patch(`/users/${id}/block`)
    showToast(res.data.message, 'success')
    renderAdminUsers()
  } catch(e) { showToast(e.response?.data?.error || 'Ошибка', 'error') }
}

async function deleteUser(id, name) {
  if (!confirm(`Удалить пользователя "${name}"? Это действие нельзя отменить.`)) return
  try {
    await api.delete(`/users/${id}`)
    showToast('Пользователь удалён', 'success')
    renderAdminUsers()
  } catch(e) { showToast(e.response?.data?.error || 'Ошибка удаления', 'error') }
}

// ===== EXPORT TO EXCEL =====
async function exportToExcel() {
  try {
    const params = new URLSearchParams()
    if (reqFilters.status && reqFilters.status !== 'all') params.set('status', reqFilters.status)
    if (reqFilters.priority && reqFilters.priority !== 'all') params.set('priority', reqFilters.priority)
    if (reqFilters.project_id && reqFilters.project_id !== 'all') params.set('project_id', reqFilters.project_id)
    if (reqFilters.applicant_id) params.set('applicant_id', reqFilters.applicant_id)
    if (reqFilters.date_from) params.set('date_from', reqFilters.date_from)
    if (reqFilters.date_to) params.set('date_to', reqFilters.date_to)

    const url = `/api/requests/export/csv?${params.toString()}`
    const response = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } })

    if (!response.ok) {
      const err = await response.json().catch(() => ({ error: 'Ошибка экспорта' }))
      showToast(err.error || 'Ошибка экспорта', 'error')
      return
    }

    const blob = await response.blob()
    const link = document.createElement('a')
    link.href = URL.createObjectURL(blob)
    const dateStr = new Date().toISOString().slice(0,10)
    link.download = `tenoil-requests-${dateStr}.csv`
    document.body.appendChild(link)
    link.click()
    document.body.removeChild(link)
    URL.revokeObjectURL(link.href)
    showToast('Файл скачан!', 'success')
  } catch(e) {
    showToast('Ошибка экспорта', 'error')
  }
}

// ===== ACTIVITY CENTER =====
let activityFilters = { action: 'all', user_id: '', date_from: '', date_to: '' }
let activityOffset = 0
const activityLimit = 30
let allUsers = []

async function renderActivity() {
  const content = document.getElementById('main-content')
  content.innerHTML = '<div class="flex items-center justify-center h-40"><i class="fas fa-spinner fa-spin text-blue-500 text-3xl"></i></div>'

  try {
    // Load users for filter (admin only)
    if (currentUser.role === 'admin' && !allUsers.length) {
      try {
        const res = await api.get('/users')
        allUsers = res.data.users || []
      } catch(e) { allUsers = [] }
    }

    const [statsRes] = await Promise.all([
      api.get('/activity/stats')
    ])
    const stats = statsRes.data

    const userOptions = currentUser.role === 'admin' ? `
      <select id="act-user-filter" onchange="activityFilters.user_id=this.value; activityOffset=0; loadActivity()"
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">Все пользователи</option>
        ${allUsers.map(u => `<option value="${u.id}">${escHtml(u.full_name)} (${u.role})</option>`).join('')}
      </select>
    ` : ''

    content.innerHTML = `
      <div class="fade-in space-y-4">
        <!-- Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
          ${statCard('Всего событий', stats.total, 'fa-stream', 'blue')}
          ${statCard('Создано заявок', stats.created, 'fa-plus-circle', 'green')}
          ${statCard('Изменений статуса', stats.status_changed, 'fa-exchange-alt', 'yellow')}
          ${statCard('Файлов загружено', stats.file_added, 'fa-paperclip', 'purple')}
        </div>

        <!-- Top Users -->
        ${stats.top_users && stats.top_users.length ? `
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h3 class="font-semibold text-gray-700 mb-3"><i class="fas fa-star mr-2 text-yellow-500"></i>Наиболее активные пользователи</h3>
          <div class="flex flex-wrap gap-2">
            ${stats.top_users.map((u, i) => `
              <span class="inline-flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-full text-sm">
                <span class="font-bold text-blue-600">#${i+1}</span>
                <span>${escHtml(u.full_name)}</span>
                <span class="text-gray-500">${u.actions} действий</span>
              </span>
            `).join('')}
          </div>
        </div>` : ''}

        <!-- Filters -->
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <div class="flex flex-wrap gap-3 items-center">
            <select id="act-action-filter" onchange="activityFilters.action=this.value; activityOffset=0; loadActivity()"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="all">Все действия</option>
              <option value="created">Создание заявки</option>
              <option value="status_changed">Изменение статуса</option>
              <option value="priority_changed">Изменение приоритета</option>
              <option value="file_added">Загрузка файла</option>
              <option value="file_removed">Удаление файла</option>
            </select>
            ${userOptions}
            <div class="flex items-center gap-2">
              <label class="text-xs text-gray-500">С:</label>
              <input type="date" id="act-date-from" value="${activityFilters.date_from}"
                class="border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none"
                onchange="activityFilters.date_from=this.value; activityOffset=0; loadActivity()" />
            </div>
            <div class="flex items-center gap-2">
              <label class="text-xs text-gray-500">По:</label>
              <input type="date" id="act-date-to" value="${activityFilters.date_to}"
                class="border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none"
                onchange="activityFilters.date_to=this.value; activityOffset=0; loadActivity()" />
            </div>
            <button onclick="activityFilters={action:'all',user_id:'',date_from:'',date_to:''}; activityOffset=0; renderActivity()" class="text-xs text-gray-500 hover:text-red-500 flex items-center gap-1">
              <i class="fas fa-times"></i>Сбросить
            </button>
            <button onclick="activityOffset=0; loadActivity()" class="ml-auto px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">
              <i class="fas fa-sync-alt mr-1"></i>Обновить
            </button>
          </div>
        </div>

        <!-- Activity list -->
        <div id="activity-list-wrap"></div>
        <div id="activity-load-more" class="text-center hidden">
          <button onclick="activityOffset+=activityLimit; loadActivity(true)" class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200">
            <i class="fas fa-chevron-down mr-1"></i>Загрузить ещё
          </button>
        </div>
      </div>
    `
    await loadActivity()
  } catch(e) { content.innerHTML = errorBlock('Ошибка загрузки центра активности') }
}

async function loadActivity(append = false) {
  const wrap = document.getElementById('activity-list-wrap')
  if (!wrap) return
  if (!append) wrap.innerHTML = '<div class="flex items-center justify-center h-20"><i class="fas fa-spinner fa-spin text-blue-400 text-2xl"></i></div>'

  try {
    const params = new URLSearchParams({
      limit: String(activityLimit),
      offset: String(activityOffset)
    })
    if (activityFilters.action !== 'all') params.set('action', activityFilters.action)
    if (activityFilters.user_id) params.set('user_id', activityFilters.user_id)
    if (activityFilters.date_from) params.set('date_from', activityFilters.date_from)
    if (activityFilters.date_to) params.set('date_to', activityFilters.date_to)

    const res = await api.get(`/activity?${params.toString()}`)
    const items = res.data.activity || []
    const total = res.data.total || 0

    const actionIcons = {
      'created':          '<i class="fas fa-plus-circle text-green-500"></i>',
      'status_changed':   '<i class="fas fa-exchange-alt text-blue-500"></i>',
      'priority_changed': '<i class="fas fa-flag text-orange-500"></i>',
      'file_added':       '<i class="fas fa-paperclip text-purple-500"></i>',
      'file_removed':     '<i class="fas fa-trash text-red-400"></i>',
    }
    const actionLabels = {
      'created':          'Создал заявку',
      'status_changed':   'Изменил статус',
      'priority_changed': 'Изменил приоритет',
      'file_added':       'Загрузил файл',
      'file_removed':     'Удалил файл',
    }
    const statusLabels = { pending: 'На рассмотрении', completed: 'Исполнено', rejected: 'Отклонено' }
    const priorityLabels = { low: 'Низкий', medium: 'Средний', high: 'Высокий', urgent: 'Срочный' }
    const roleLabels = { admin: 'Администратор', applicant: 'Заявитель', supplier: 'Снабженец' }

    if (!items.length && !append) {
      wrap.innerHTML = '<div class="bg-white rounded-xl border border-gray-200 p-12 text-center text-gray-400"><i class="fas fa-stream text-3xl mb-2 block"></i><p>Нет событий</p></div>'
      return
    }

    const html = items.map(item => {
      const icon = actionIcons[item.action] || '<i class="fas fa-circle text-gray-400"></i>'
      const label = actionLabels[item.action] || item.action
      const dt = new Date(item.created_at).toLocaleString('ru-RU')
      const roleLabel = roleLabels[item.actor_role] || item.actor_role

      let detail = ''
      if (item.action === 'status_changed') {
        const from = statusLabels[item.old_value] || item.old_value || ''
        const to = statusLabels[item.new_value] || item.new_value || ''
        detail = `<span class="text-gray-400">${from}</span> → <span class="font-medium">${to}</span>`
        if (item.comment) detail += ` <span class="text-red-500 text-xs">(${escHtml(item.comment)})</span>`
      } else if (item.action === 'priority_changed') {
        const from = priorityLabels[item.old_value] || item.old_value || ''
        const to = priorityLabels[item.new_value] || item.new_value || ''
        detail = `<span class="text-gray-400">${from}</span> → <span class="font-medium">${to}</span>`
      } else if (item.action === 'file_added') {
        detail = `<span class="text-gray-600">${escHtml(item.new_value || '')}</span>`
      } else if (item.action === 'file_removed') {
        detail = `<span class="text-red-400 line-through">${escHtml(item.old_value || '')}</span>`
      } else if (item.comment) {
        detail = `<span class="text-gray-600">${escHtml(item.comment)}</span>`
      }

      return `
        <div class="flex gap-3 items-start py-3 border-b border-gray-100 last:border-0 hover:bg-gray-50 px-2 rounded-lg transition">
          <div class="w-9 h-9 flex-shrink-0 rounded-full bg-gray-100 flex items-center justify-center text-lg mt-0.5">
            ${icon}
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center flex-wrap gap-x-2 gap-y-0.5">
              <span class="font-medium text-gray-800">${escHtml(item.actor_name)}</span>
              <span class="text-xs text-gray-400">${roleLabel}</span>
              <span class="text-sm text-gray-600">${label}</span>
            </div>
            <div class="text-sm text-gray-700 mt-0.5">
              <span class="text-blue-600 cursor-pointer hover:underline" onclick="openRequest(${item.request_id})">${escHtml(item.request_number || '#'+item.request_id)}</span>
              — <span class="font-medium">${escHtml(item.product_name)}</span>
              ${item.model ? `<span class="text-gray-400">(${escHtml(item.model)})</span>` : ''}
              ${detail ? `<span class="ml-1">${detail}</span>` : ''}
            </div>
          </div>
          <div class="text-xs text-gray-400 flex-shrink-0 mt-1">${dt}</div>
        </div>
      `
    }).join('')

    if (append) {
      const existing = wrap.querySelector('.activity-list-inner')
      if (existing) existing.insertAdjacentHTML('beforeend', html)
      else wrap.innerHTML = `<div class="bg-white rounded-xl border border-gray-200 p-4"><div class="activity-list-inner">${html}</div></div>`
    } else {
      wrap.innerHTML = `
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <div class="flex items-center justify-between mb-3">
            <span class="text-sm text-gray-500">Показано ${Math.min(activityOffset + activityLimit, total)} из ${total} событий</span>
          </div>
          <div class="activity-list-inner">${html}</div>
        </div>
      `
    }

    const loadMoreBtn = document.getElementById('activity-load-more')
    if (loadMoreBtn) {
      if (activityOffset + activityLimit < total) {
        loadMoreBtn.classList.remove('hidden')
      } else {
        loadMoreBtn.classList.add('hidden')
      }
    }
  } catch(e) {
    if (!append) wrap.innerHTML = errorBlock('Ошибка загрузки событий')
  }
}

  if (!token) return
  try {
    const res = await api.get('/auth/me')
    currentUser = res.data
    await loadProjects()
    initApp()
  } catch(e) {
    token = null
    localStorage.removeItem('token')
  }
}

boot()
